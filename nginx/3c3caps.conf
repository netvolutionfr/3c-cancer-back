# Configuration Nginx pour 3c3caps.siovision.fr
# Placer ce fichier dans /etc/nginx/sites-available/ puis créer un lien symbolique vers sites-enabled/
# Certificat SSL généré avec : certbot --nginx -d 3c3caps.siovision.fr

server {
    listen 80;
    server_name 3c3caps.siovision.fr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name 3c3caps.siovision.fr;

    ssl_certificate     /etc/letsencrypt/live/3c3caps.siovision.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3c3caps.siovision.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Taille max pour les uploads média
    client_max_body_size 100M;

    location / {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

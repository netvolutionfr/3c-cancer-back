name: Deploy to production

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/netvolutionfr/3c-cancer-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /home/asso3c/3c-cancer-back

            echo "==> Pull du code source"
            git pull origin master

            echo "==> Connexion à GitHub Container Registry"
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "==> Pull de la nouvelle image"
            docker pull ghcr.io/netvolutionfr/3c-cancer-back:latest

            echo "==> Redémarrage des conteneurs"
            docker compose up -d

            echo "==> Nettoyage des images obsolètes"
            docker image prune -f

            echo "==> Déploiement terminé"
